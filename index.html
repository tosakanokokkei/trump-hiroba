                    '【準備】ジョーカーを除いた52枚から、裏向きのままランダムに1枚抜き取ります。このカードは誰にも見せないように伏せておきます。',
                    '残りのカードを全員に配り、手札に同じ数字のペアがあれば場に捨てます。',
                    '順番に隣の人の手札から1枚引き、ペアができたら捨てます。これを繰り返します。',
                    '【勝利条件】手札がすべてなくなった人から勝ち抜けです。最後に、最初に抜いた1枚と同じ数字のカードを持っていた人が負けとなります。'
                ],
                ruleImages: { 0: 'rule_jiji0.png' },
                notes: [
                    'ババ抜きと違い、最後に残るカードが何かわからないのが最大の特徴です。',
                    'ジョーカーを1枚混ぜて、合計2枚の「余り」が出るようにするルールもあります。'
                ]
            },
            {
                id: 'shichinarabe',
                name: '七並べ',
                catch: '「ねぇ６止めてるのだれ！？」',
                playerTags: ['3+'],
                traits: { strategy: 4, luck: 3, memory: 2, reflex: 1 },
                requirements: ['トランプ52枚'],
                image: 'header_shichi.png',
                color: '#F7D06C',
                icon: 'format_list_numbered',
                description: '「7」を中心に数字を並べていく。相手を妨害するためにあえてカードを出さない「戦略的パス」が勝負を分ける。',
                rules: [
                    '【準備】すべてのカードを配りきります。手札にある「7」のカードをすべて場の中央に縦に並べます。',
                    '7の両隣（6または8）に繋がる数字のカードを順番に出していきます。',
                    '出せるカードがない、または戦略的に出したくない場合は「パス」ができます。ただし、パスには回数制限（一般的に3回まで）があります。',
                    '【勝利条件】一番早く手札をすべて並べ終えたプレイヤーの勝利です。パスの回数制限を超えて、出せるカードがない場合は脱落（負け）となります。'
                ],
                ruleImages: { 0: 'rule_shichi0.png' },
                notes: [
                    '端っこの数字（1や13）を止めて、他の人がカードを出せないようにする「ブロック」が有効な戦略です。',
                    '脱落した人の手札はすべて場に並べられます。',
                    '久しぶりに使うトランプの場合、すべてのカードが揃っているか確認するために七並べをすることもあります。'
                ]
            },
            {
                id: 'doubt',
                name: 'ダウト',
                catch: '嘘を見抜き、真実を暴け！',
                playerTags: ['3+'],
                traits: { strategy: 3, luck: 2, memory: 4, reflex: 3 },
                requirements: ['トランプ52枚'],
                image: 'header_doubt.png',
                color: '#E59A9C',
                icon: 'gavel',
                description: '数字を順番に宣言しながらカードを出していく。嘘をついていると思ったら「ダウト！」と叫んで暴き出す心理戦。',
                rules: [
                    '【準備】ジョーカーを除いた52枚のカードを、全員に均等になるように配りきります。',
                    '最初の人は「1（A）」と言いながら、カードを裏向きで中央に出します。次の人は「2」、その次は「3」と、時計回りに数字を1つずつ進めながら出していきます。',
                    '出すカードは宣言した数字と違っても構いません（嘘をついても良い）。手札にその数字がない場合は、嘘をついて別のカードを出す必要があります。',
                    '【ダウト！】誰かが嘘をついていると思ったら、次の人がカードを出す前に「ダウト！」と叫びます。出されたカードを確認し、嘘なら出した人が、本当なら叫んだ人が場に溜まったカードをすべて引き取ります。',
                    '【勝利条件】一番早く手札がなくなった人の勝利です。'
                ],
                ruleImages: { 0: 'rule_doubt0.png' },
                notes: [
                    'カードを出す際、いかに自然に嘘をつくか、または相手の表情から嘘を見抜くかがポイントです。',
                    '自分の宣言する数字が近づいてきたら、あらかじめ嘘をつく準備をしておくのも戦略です。'
                ]
            },
            {
                id: 'blackjack',
                name: 'ブラックジャック',
                catch: '21の深淵、ディーラーとの真剣勝負',
                playerTags: ['2', '3+'],
                traits: { strategy: 4, luck: 4, memory: 2, reflex: 1 },
                requirements: ['トランプ52枚', 'チップ（または代用品）'],
                image: 'header_black.png',
                color: '#81C3E2',
                icon: 'style',
                description: 'カードの合計を「21」に近づけるカジノの定番。ディーラーとの駆け引きと、引き際の判断が勝敗を分ける。',
                rules: [
                    '【準備】プレイヤーとディーラーに2枚ずつカードを配ります。ディーラーのカードは1枚だけ表向き（アップカード）にします。',
                    '自分の手札の合計を確認します。Aは「1」または「11」として数え、J・Q・Kは「10」として数えます。',
                    '【アクション】合計が21に近づくよう、カードを追加する（ヒット）か、今の数字で勝負する（スタンド）かを選びます。21を超えると（バースト）即座に負けとなります。',
                    '【ディーラーの行動】全員のアクション終了後、ディーラーは自分の合計が「17」以上になるまで必ずカードを引き続けなければなりません。',
                    '【勝利条件】バーストせず、ディーラーよりも「21」に近い数字を持っていたプレイヤーの勝利です。'
                ],
                ruleImages: { 0: 'rule_black0.png' },
                hands: [
                    { name: 'カードの数え方', detail: '2〜10はそのまま、絵札（J,Q,K）は10、Aは1または11として状況に応じて有利な方で数えます。'}
                ],
                notes: [
                    'ディーラーの表向きのカードを見て、相手がバーストする確率を予想するのが重要です。',
                    '最初の2枚で合計が21（Aと10点札）になることを「ブラックジャック」と呼びます。'
                ]
            }
        ];

        let state = { players: [], traits: [] };
        let lastScrollY = 0;

        function handleTagClick(type, value) {
            if (type === 'players') {
                state.players = state.players.includes(value) ? [] : [value];
            } else {
                state.traits = state.traits.includes(value) ? [] : [value];
            }
            renderAll();
        }

        function renderAll() {
            const grid = document.getElementById('game-grid');
            grid.innerHTML = '';
            
            const filtered = games.filter(g => {
                const pMatch = state.players.length === 0 || state.players.some(p => g.playerTags.includes(p));
                const tMatch = state.traits.length === 0 || state.traits.some(t => g.traits[t] >= 4);
                return pMatch && tMatch;
            });

            document.querySelectorAll('.filter-chip').forEach(btn => {
                const text = btn.innerText.trim();
                let active = false;
                if (btn.closest('#filter-players-container')) {
                    const mapped = text.includes('1人') ? '1' : text.includes('2人') ? '2' : '3+';
                    active = state.players.includes(mapped);
                } else {
                    const key = Object.keys(traitNames).find(k => text.includes(traitNames[k]));
                    active = state.traits.includes(key);
                }
                btn.className = `filter-chip px-3 py-1.5 text-xs ${active ? 'active' : ''}`;
            });

            filtered.forEach(game => {
                const card = document.createElement('div');
                card.className = 'toy-card p-4 flex flex-col';
                card.onclick = () => location.hash = game.id;

                const headerContent = game.image 
                    ? `<img src="${game.image}" alt="${game.name}" class="w-full h-full object-contain">` 
                    : `<span class="material-icons icon-placeholder" style="color: ${game.color}">${game.icon}</span>`;

                card.innerHTML = `
                    <div class="game-image-wrapper">${headerContent}</div>
                    <div class="text-center mb-3">
                        <h3 class="text-2xl font-[900] text-[#4A4541] mb-1">${game.name}</h3>
                        <p class="text-xs font-bold text-[#A69F98] leading-tight px-2">${game.catch}</p>
                    </div>
                    <div class="w-full pt-3 border-t border-[#F1ECE7] space-y-2">
                        <div class="flex flex-wrap gap-1.5 mb-2">
                            ${game.playerTags.map(tagKey => `
                                <div class="flex items-center gap-1.5 bg-[#F9F5F1] border-2 border-[#DAD1C9] rounded-2xl px-2.5 py-1">
                                    <span class="material-icons text-[#4A4541]" style="font-size: 16px">${playerTagMeta[tagKey].icon}</span>
                                    <span class="text-[12px] font-black text-[#4A4541]">${playerTagMeta[tagKey].label}</span>
                                </div>
                            `).join('')}
                        </div>
                        ${Object.keys(traitNames).map(k => `
                            <div class="flex items-center gap-1.5">
                                <span class="material-icons shrink-0" style="font-size: 20px; color: ${game.color}">${traitIcons[k]}</span>
                                <span class="text-base font-black text-[#4A4541] w-14 shrink-0">${traitNames[k]}</span>
                                <div class="progress-block">
                                    <div class="progress-inner" style="width: ${game.traits[k]*20}%; background-color: ${game.color}"></div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function showDetail(game) {
            const color = game.color;
            const badgePattern = (str) => str.replace(/【(.*?)】/g, `<span class="inline-badge" style="background-color: ${color}25; border: 1px solid ${color}40; color: #4A4541;">$1</span>`);

            document.getElementById('detail-title').innerText = game.name;
            document.getElementById('detail-description').innerText = game.description;
            
            const detailPlayersContainer = document.getElementById('detail-players-container');
            detailPlayersContainer.innerHTML = game.playerTags.map(tagKey => `
                <div class="px-3 py-1 rounded-full text-[10px] font-black tracking-widest uppercase bg-[#EEEAE6] text-[#4A4541] flex items-center gap-1.5">
                    <span class="material-icons" style="font-size: 14px">${playerTagMeta[tagKey].icon}</span>
                    <span>${playerTagMeta[tagKey].label}</span>
                </div>
            `).join('');
            
            const detailParamsGrid = document.getElementById('detail-params-grid');
            detailParamsGrid.innerHTML = Object.keys(traitNames).map(k => `
                <div class="flex items-center gap-3 py-0.5">
                    <div class="w-8 h-8 md:w-10 md:h-10 rounded-lg flex items-center justify-center shrink-0" style="background-color: ${game.color}20">
                        <span class="material-icons" style="font-size: 20px; color: ${game.color}">${traitIcons[k]}</span>
                    </div>
                    <div class="w-14 md:w-16 shrink-0">
                        <span class="text-sm md:text-base font-black text-[#4A4541]">${traitNames[k]}</span>
                    </div>
                    <div class="flex-1">
                        <div class="progress-block" style="height: 10px">
                            <div class="progress-inner" style="width: ${game.traits[k]*20}%; background-color: ${game.color}"></div>
                        </div>
                    </div>
                </div>
            `).join('');

            const reqList = document.getElementById('detail-requirements-list');
            reqList.innerHTML = (game.requirements || []).map(req => `
                <div class="flex items-center gap-2 bg-[#EEEAE6] px-4 py-2 rounded-2xl">
                    <span class="material-icons" style="font-size: 16px; color: ${game.color}">inventory_2</span>
                    <span class="text-xs font-black text-[#4A4541]">${req}</span>
                </div>
            `).join('');

            const detailImageArea = document.getElementById('detail-image-container');
            detailImageArea.innerHTML = game.image 
                ? `<img src="${game.image}" class="w-full h-full object-contain">` 
                : `<span class="material-icons text-8xl" style="color:${game.color}">${game.icon}</span>`;

            document.getElementById('detail-rules-steps').innerHTML = game.rules.map((r, i) => {
                const subImage = (game.ruleImages && game.ruleImages[i]) 
                    ? `<img src="${game.ruleImages[i]}" class="rule-sub-image" alt="Step Illustration">`
                    : '';

                return `
                    <div class="flex flex-col gap-2 p-4 rounded-[24px] bg-[#F9F5F1]">
                        <div class="flex gap-4 items-start">
                            <div class="rule-number" style="background-color: ${game.color}; color: white">${i+1}</div>
                            <p class="text-base font-bold text-[#4A4541] leading-relaxed text-left">${badgePattern(r)}</p>
                        </div>
                        <div class="flex justify-center w-full">
                            ${subImage}
                        </div>
                    </div>
                `;
            }).join('');

            // Hands section (Dynamic Title Logic)
            const handsSection = document.getElementById('detail-hands-section');
            const handsTitle = document.getElementById('detail-hands-title');
            const handsList = document.getElementById('detail-hands-list');
            if (game.hands) {
                handsSection.classList.remove('hidden');
                // タイトルを動的に切り替え（ポーカーは役、その他は強さ一覧など）
                handsTitle.innerText = game.id === 'poker' ? '役の強さ（ハンド）' : 'カードの強さ一覧';
                
                handsList.innerHTML = game.hands.map(h => `
                    <div class="p-4 rounded-2xl border-2 border-[#EEEAE6]">
                        <span class="local-rule-badge" style="color:${game.color}">${h.name}</span>
                        <p class="mt-1 text-sm font-bold text-[#4A4541] mb-2">${h.detail}</p>
                        ${h.image ? `<img src="${h.image}" class="rule-sub-image" style="max-width:100%" alt="Hand List">` : ''}
                    </div>
                `).join('');
            } else {
                handsSection.classList.add('hidden');
            }

            const localRulesSection = document.getElementById('detail-local-rules-section');
            const localRulesList = document.getElementById('detail-local-rules-list');
            if (game.localRules) {
                localRulesSection.classList.remove('hidden');
                localRulesList.innerHTML = game.localRules.map(lr => `
                    <div class="p-4 rounded-2xl border-2 border-[#EEEAE6]">
                        <span class="local-rule-badge" style="color:${game.color}">${lr.name}</span>
                        <p class="mt-1 text-sm font-bold text-[#4A4541]">${lr.detail}</p>
                    </div>
                `).join('');
            } else {
                localRulesSection.classList.add('hidden');
            }

            const notesSection = document.getElementById('detail-notes-section');
            const notesTitleElement = document.getElementById('detail-notes-title');
            const notesList = document.getElementById('detail-notes-list');
            if (game.notes && game.notes.length > 0) {
                notesSection.classList.remove('hidden');
                notesSection.style.borderColor = game.color;
                notesTitleElement.innerText = game.notesTitle || "補足";
                notesList.innerHTML = game.notes.map(n => `
                    <li class="flex gap-3 text-sm font-bold text-[#4A4541]">
                        <span class="material-icons" style="color:${game.color}; font-size:18px">check_circle</span>
                        <span>${badgePattern(n)}</span>
                    </li>
                `).join('');
            } else {
                notesSection.classList.add('hidden');
            }
        }

        function router() {
            const hash = location.hash.replace('#', '');
            const listView = document.getElementById('list-view');
            const detailView = document.getElementById('detail-view');

            if (hash) {
                const game = games.find(g => g.id === hash);
                if (game) {
                    // 詳細へ進む前に、現在の一覧画面でのスクロール位置を保存
                    if (!listView.classList.contains('hidden')) {
                        lastScrollY = window.scrollY;
                    }
                    showDetail(game);
                    listView.classList.add('hidden');
                    detailView.classList.remove('hidden');
                    window.scrollTo(0, 0);
                } else {
                    // IDが無効な場合はハッシュをクリア
                    location.hash = '';
                }
            } else {
                listView.classList.remove('hidden');
                detailView.classList.add('hidden');
                renderAll();
                // 一覧に戻った直後、保存していた位置にスクロールを復元
                setTimeout(() => {
                    window.scrollTo(0, lastScrollY);
                }, 0);
            }
        }

        window.addEventListener('hashchange', router);
        window.onload = () => {
            router();
        };
    </script>
</body>
</html>
